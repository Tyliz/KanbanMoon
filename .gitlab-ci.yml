stages:
    - mirror

github_mirror:
    stage: mirror
    image: alpine:latest
    before_script:
        - apk add --no-cache git openssh-client
    script:
        # Reemplaza TU_USUARIO_GITHUB y TU_REPOSITORIO con tus datos reales
        - git remote add github https://oauth2:${GITHUB_TOKEN}@github.com/Tyliz/KanbanMoon.git || true
        # Forzamos el empuje de la rama principal a GitHub
        - git push --force github HEAD:refs/heads/main
    only:
        - main
